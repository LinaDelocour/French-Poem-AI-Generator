<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Poem Generator</title>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <h1 id="h1">AI French Poem Generator</h1>
    <form id="form">
        <input type="text" placeholder="Type your poem here..."
        required
        autocomplete="off"
        autofocus
        class="instructions"
        />
        <input type="submit"
        class="button"
        id="button"/>
    </form>
    <div class="poem"
    id="poem">
    </div>
    <footer id="footer">This AI project was coded by <a href="https://github.com/LinaDelocour" target="blank">Polina Dorohykh</a> and is open-sourced on <a href="https://github.com/LinaDcour/French-Poem-AI-Generator">GitHub</a> and is hosted on <a href="https://frenchpoem-aigenerator.netlify.app/">Netlify</a></footer>
    <script src="src/js.js"></script>
</body>
</html>
